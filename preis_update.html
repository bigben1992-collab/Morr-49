<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preis-Update | Lager Pro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --a: #f59e0b; --bg: #f8fafc; --p: #1e293b; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--p); }
    .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
    #reader { width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 14px; background: var(--a); color: white; font-weight: 700; cursor: pointer; font-size: 1rem; }
    .back { display: block; text-align: center; margin-top: 30px; text-decoration: none; color: #64748b; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin-top:0;">💰 Preis hinterlegen</h3>
    <div id="reader"></div>
    <label style="font-size:11px; font-weight:bold; color:#64748b;">ARTIKEL SCANNEN</label>
    <input type="text" id="artId" placeholder="EAN / ID...">
    <label style="font-size:11px; font-weight:bold; color:#64748b;">NEUER PREIS (€)</label>
    <input type="number" id="preis" step="0.01" placeholder="0.00">
    <button class="btn" onclick="save()">PREIS AKTUALISIEREN</button>
  </div>
  <a href="index.html" class="back">← Hauptmenü</a>

  <script>
    const api = "https://script.google.com/macros/s/AKfycbxVzhqyg5a8pPQaanfcDEL-WqFRmBVMUP8eMBlwPxZ1aRFK-wSyhwok6R_uQ_PO4mc_/exec"; // DEINE URL EINTRAGEN

    async function save() {
      const art = document.getElementById('artId').value.trim();
      const pr = document.getElementById('preis').value;
      if(!art || !pr) return alert("Bitte Artikel scannen und Preis eingeben.");

      try {
        const response = await fetch(api, {
          method: "POST",
          body: JSON.stringify({
            daten: { typ: "Preis-Update", artikel: art, preis: pr, menge: 0, platz: "Büro" }
          })
        });
        const res = await response.json();
        if(res.status === "success") {
          alert("Preis für " + res.name + " gespeichert!");
          document.getElementById('preis').value = "";
        }
      } catch(e) { alert("Fehler beim Speichern!"); }
    }

    let sc = new Html5Qrcode("reader");
    sc.start({facingMode:"environment"}, {fps:10, qrbox:250}, (txt) => {
      document.getElementById('artId').value = txt;
      if(window.navigator.vibrate) window.navigator.vibrate(50);
    }).catch(()=>{});
  </script>
</body>
</html>
