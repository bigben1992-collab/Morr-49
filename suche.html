<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suche | Lager Pro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
    #ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99; color: white; display: none; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="ov">Berechne...</div>
  <div class="container">
    <div class="card">
      <h3>🔎 Artikelsuche</h3>
      <div id="reader"></div>
      <input type="text" id="artInput" placeholder="Artikel scannen..." onchange="suche()">
      <div id="result"></div>
    </div>
  </div>

  <script>
    const api = "DEINE_WEB_APP_URL"; // HIER URL EINTRAGEN

    async function suche() {
      const id = document.getElementById('artInput').value.trim();
      if(!id) return;
      
      const resDiv = document.getElementById('result');
      document.getElementById('ov').style.display = 'flex';
      
      try {
        const r = await fetch(`${api}?aktion=warensuche&artikelId=${encodeURIComponent(id)}`);
        const d = await r.json();
        
        if(d.res && d.res.length > 0) {
          let h = `<h4>${d.name || "Unbekannt"}</h4><table><tr><th>Platz</th><th>Menge</th></tr>`;
          d.res.forEach(i => h += `<tr><td>📍 ${i.platz}</td><td>${i.menge}</td></tr>`);
          resDiv.innerHTML = h + `</table>`;
        } else {
          resDiv.innerHTML = "<p>Kein Bestand gefunden.</p>";
        }
      } catch(e) {
        resDiv.innerHTML = "<p>Fehler!</p>";
      } finally {
        document.getElementById('ov').style.display = 'none';
      }
    }

    let sc = new Html5Qrcode("reader");
    sc.start({facingMode:"environment"}, {fps:10, qrbox:250}, (txt) => {
      document.getElementById('artInput').value = txt;
      suche();
    }).catch(()=>{});
  </script>
</body>
</html>
