<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager-Pro | Filiale 77</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --accent: #d63384; --success: #28a745; --danger: #dc3545; }
        
        /* Das gesamte Fenster wird ein Flex-Container */
        body { 
            font-family: -apple-system, sans-serif; 
            background: #000; 
            margin: 0; padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        /* 1. Kamera-Bereich: Nimmt den restlichen Platz ein */
        #reader { 
            flex-grow: 1; 
            width: 100%; 
            background: #000; 
            overflow: hidden; 
            position: relative;
        }

        #reader video { object-fit: cover; }

        /* 2. UI-Bereich: Liegt UNTEN und passt sich dem Inhalt an */
        .ui-wrapper { 
            background: white; 
            border-radius: 20px 20px 0 0; 
            padding: 20px; 
            box-sizing: border-box; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 10; /* Über dem Video */
            transition: all 0.3s ease;
        }

        .zoom-box { 
            background: #f1f3f5; 
            padding: 10px 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ced4da;
        }
        
        .zoom-slider { 
            width: 100%; 
            height: 30px; 
            margin-top: 5px;
        }

        #instruction { font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 10px; }
        label { font-size: 10px; font-weight: bold; color: #888; display: block; margin-bottom: 4px; }
        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #eee; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background: #f9f9f9; 
            color: #333;
        }
        
        .btn-row { 
            display: none; /* Wird per JS auf 'flex' gesetzt */
            gap: 10px; 
            margin-top: 15px; 
            padding-bottom: env(safe-area-inset-bottom); /* iPhone Support */
        }

        button { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: bold; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="ui-wrapper">
        <div id="instruction">Warte auf Kamera...</div>
        
        <div class="zoom-box">
            <label id="zoom-label">🔍 ZOOM: 1.0x</label>
            <input type="range" class="zoom-slider" id="zoom-range" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label>ARTIKEL</label>
            <input type="text" id="input-ware" placeholder="..." readonly>
        </div>

        <div class="input-group">
            <label>LAGERPLATZ</label>
            <input type="text" id="input-platz" placeholder="..." readonly>
        </div>

        <div class="btn-row" id="action-buttons">
            <button style="background: var(--success);" onclick="submit('EINLAGERN')">EINLAGERN</button>
            <button style="background: var(--danger);" onclick="submit('AUSLAGERN')">AUSLAGERN</button>
        </div>
    </div>

    <script>
        let scanner;
        let cameraTrack = null;

        async function init() {
            setupZoom();
            scanner = new Html5Qrcode("reader");
            
            try {
                await scanner.start(
                    { facingMode: "environment" }, 
                    { fps: 25, qrbox: (w, h) => ({ width: w * 0.7, height: h * 0.3 }) },
                    (text) => processScan(text)
                );
                document.getElementById('instruction').innerText = "Bereit: ARTIKEL SCANNEN";
                
                setTimeout(() => {
                    cameraTrack = scanner.getRunningTrack();
                    syncHardwareZoom();
                }, 1000);
            } catch (e) {
                document.getElementById('instruction').innerText = "KAMERA-FEHLER!";
            }
        }

        function setupZoom() {
            const slider = document.getElementById('zoom-range');
            const label = document.getElementById('zoom-label');

            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                label.innerText = `🔍 ZOOM: ${val.toFixed(1)}x`;

                // Hardware Zoom (Android)
                if (cameraTrack && cameraTrack.getCapabilities().zoom) {
                    cameraTrack.applyConstraints({ advanced: [{ zoom: val }] });
                }
                
                // Digitaler Zoom Fallback (iOS & Browser)
                const video = document.querySelector('#reader video');
                if (video) {
                    video.style.transform = `scale(${val})`;
                    video.style.transformOrigin = "center center";
                }
            });
        }

        function syncHardwareZoom() {
            if (cameraTrack && cameraTrack.getCapabilities().zoom) {
                const caps = cameraTrack.getCapabilities();
                const slider = document.getElementById('zoom-range');
                slider.min = caps.zoom.min;
                slider.max = caps.zoom.max;
                slider.step = caps.zoom.step;
            }
        }

        function processScan(text) {
            const inputWare = document.getElementById('input-ware');
            const inputPlatz = document.getElementById('input-platz');

            if (!inputWare.value) {
                inputWare.value = text;
                document.getElementById('instruction').innerText = "PLATZ SCANNEN";
            } else if (!inputPlatz.value && text !== inputWare.value) {
                inputPlatz.value = text;
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('instruction').innerText = "BUCHUNG BEREIT";
            }
        }

        function submit(mode) {
            alert(mode + " erfolgreich!");
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
