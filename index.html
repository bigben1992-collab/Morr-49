<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager-Pro | Filiale 77</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --accent: #d63384; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Kamera-Bereich */
        #reader { 
            width: 100%; 
            height: 45vh; 
            background: #000; 
            overflow: hidden; /* Wichtig für digitalen Zoom! */
            position: relative;
        }

        /* Verhindert, dass das Video-Element bei digitalem Zoom Layout-Probleme macht */
        #reader video {
            object-fit: cover;
        }
        
        .ui-wrapper { 
            flex: 1; 
            width: 100%; 
            background: white; 
            border-radius: 20px 20px 0 0; 
            margin-top: -20px; 
            z-index: 1000;
            padding: 15px; 
            box-sizing: border-box; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .zoom-box { 
            display: block; 
            background: #f8f9fa; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd;
        }
        
        .zoom-slider { 
            width: 100%; 
            height: 35px; 
            margin-top: 8px;
            cursor: pointer;
        }

        #instruction { font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; font-size: 14px; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; color: #777; display: block; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
        
        .btn-row { display: none; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="ui-wrapper">
        <div id="instruction">INITIALISIERE KAMERA...</div>
        
        <div class="zoom-box">
            <label id="zoom-label">🔍 ZOOM: 1.0x</label>
            <input type="range" class="zoom-slider" id="zoom-range" min="1" max="4" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label>ARTIKEL / EAN</label>
            <input type="text" id="input-ware" placeholder="Scannen..." readonly>
        </div>

        <div class="input-group">
            <label>LAGERPLATZ</label>
            <input type="text" id="input-platz" placeholder="Warte auf Artikel..." readonly>
        </div>

        <div class="btn-row" id="action-buttons">
            <button style="background: var(--success);" onclick="submit('EINLAGERN')">EINLAGERN</button>
            <button style="background: var(--danger);" onclick="submit('AUSLAGERN')">AUSLAGERN</button>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbxXe3A2Ym0gm_r4R_HdEU_B8afvzc645--F031Y60znDFIEVb_RtUVeHA8vpXF84XzSCw/exec", 
            branch: "Filiale 77 Hansen"
        };

        let scanner;
        let cameraTrack = null;
        let isHardwareZoomSupported = false;

        async function init() {
            setupZoomListener();
            
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                aspectRatio: 1.0
            };

            try {
                await scanner.start(
                    { facingMode: "environment" }, 
                    config,
                    (text) => { processScan(text); }
                );
                
                document.getElementById('instruction').innerText = "BEREIT: ARTIKEL SCANNEN";
                
                // Kurz warten, bis der Track stabil ist
                setTimeout(() => {
                    cameraTrack = scanner.getRunningTrack();
                    checkZoomCapabilities();
                }, 1000);

            } catch (e) {
                document.getElementById('instruction').innerText = "FEHLER: Kamera nicht gefunden!";
                console.error(e);
            }
        }

        function checkZoomCapabilities() {
            if (cameraTrack && typeof cameraTrack.getCapabilities === 'function') {
                const caps = cameraTrack.getCapabilities();
                if (caps.zoom) {
                    const slider = document.getElementById('zoom-range');
                    slider.min = caps.zoom.min;
                    slider.max = caps.zoom.max;
                    slider.step = caps.zoom.step;
                    isHardwareZoomSupported = true;
                    console.log("Hardware Zoom aktiv");
                }
            }
            if (!isHardwareZoomSupported) {
                console.log("Nutze Digitalen Zoom Fallback");
            }
        }

        function setupZoomListener() {
            const slider = document.getElementById('zoom-range');
            const label = document.getElementById('zoom-label');

            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                label.innerText = `🔍 ZOOM: ${val.toFixed(1)}x`;

                // 1. Hardware Zoom Versuch
                if (isHardwareZoomSupported && cameraTrack) {
                    cameraTrack.applyConstraints({
                        advanced: [{ zoom: val }]
                    }).catch(err => console.error("Hardware Zoom Error", err));
                } 
                
                // 2. Digital Zoom Fallback (immer anwenden oder als Fallback)
                // Wir skalieren das Video-Element im Container
                const video = document.querySelector('#reader video');
                if (video) {
                    video.style.transform = `scale(${val})`;
                    video.style.transformOrigin = "center center";
                }
            });
        }

        function processScan(text) {
            const inputWare = document.getElementById('input-ware');
            const inputPlatz = document.getElementById('input-platz');

            // Akustisches Feedback (optional)
            // if (window.navigator.vibrate) window.navigator.vibrate(100);

            if (!inputWare.value) {
                inputWare.value = text;
                document.getElementById('instruction').innerText = "NÄCHSTER SCHRITT: PLATZ SCANNEN";
                document.getElementById('instruction').style.color = "var(--primary)";
            } else if (!inputPlatz.value && text !== inputWare.value) {
                inputPlatz.value = text;
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('instruction').innerText = "BUCHUNG BEREIT";
                document.getElementById('instruction').style.color = "var(--success)";
            }
        }

        function submit(typ) {
            const data = {
                typ: typ,
                artikel: document.getElementById('input-ware').value,
                platz: document.getElementById('input-platz').value,
                filiale: APP_CONFIG.branch
            };
            
            alert("Buchung erfolgreich: " + typ + "\n" + data.artikel + " auf " + data.platz);
            location.reload(); // Reset für nächsten Scan
        }

        window.onload = init;
    </script>
</body>
</html>
