<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager-Pro | Filiale 77</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --accent: #d63384; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        header { background: var(--dark); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .menu-btn { background: none; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 5px; font-size: 20px; }

        #main-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        #main-menu.active { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; display: none; }
        .menu-overlay.active { display: block; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; color: var(--dark); text-decoration: none; display: block; }

        #reader { flex-grow: 1; width: 100%; background: #000; overflow: hidden; }
        #reader video { object-fit: cover; }

        .ui-wrapper { background: white; border-radius: 20px 20px 0 0; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
        .zoom-box { background: #f8f9fa; padding: 8px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
        .zoom-slider { width: 100%; height: 30px; }

        #instruction { font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; font-size: 13px; }
        .input-group { margin-bottom: 8px; }
        label { font-size: 10px; font-weight: bold; color: #888; display: block; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; }
        
        .btn-row { display: none; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div id="current-mode-title" style="font-weight: bold;">Item Transfer</div>
        <div style="font-size: 10px;">F77</div>
    </header>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <nav id="main-menu">
        <h2 style="color: var(--primary);">Lager-Pro</h2>
        <a href="#" class="menu-item" onclick="setMode('Item Transfer')">🔄 Item Transfer</a>
        <a href="#" class="menu-item" onclick="setMode('Platz prüfen')">📍 Platz prüfen</a>
        <a href="#" class="menu-item" onclick="setMode('Warenbezeichnung')">🏷️ Warenbezeichnung</a>
        <div style="margin-top: 20px; font-size: 11px; color: #ccc;">v2.1.0</div>
    </nav>

    <div id="reader"></div>

    <div class="ui-wrapper">
        <div id="instruction">INITIALISIERE...</div>
        
        <div class="zoom-box">
            <label id="zoom-label">🔍 ZOOM: 1.0x</label>
            <input type="range" class="zoom-slider" id="zoom-range" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label id="label-1">ARTIKEL / EAN</label>
            <input type="text" id="input-1" placeholder="Scannen..." readonly>
        </div>

        <div class="input-group" id="group-2">
            <label id="label-2">LAGERPLATZ</label>
            <input type="text" id="input-2" placeholder="Warten..." readonly>
        </div>

        <div class="btn-row" id="action-buttons">
            <button class="btn-action" style="background: var(--success);" id="btn-main" onclick="handleAction('EIN')">EINLAGERN</button>
            <button class="btn-action" style="background: var(--danger);" id="btn-sub" onclick="handleAction('AUS')">AUSLAGERN</button>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbyB6j0qIdNneZfGE4Zhpcn1pkduEQH8VqOudPaMhTVyG5vu3Z1hm8xliAIXDR3Uj0dR5A/exec" // <-- DEINE GOOGLE URL EINTRAGEN
        };

        let scanner, cameraTrack, currentMode = 'Item Transfer';

        async function init() {
            setupZoom();
            scanner = new Html5Qrcode("reader");
            try {
                await scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: {width: 250, height: 150} }, (text) => processScan(text));
                document.getElementById('instruction').innerText = "BEREIT FÜR SCAN";
                setTimeout(() => { cameraTrack = scanner.getRunningTrack(); }, 1000);
            } catch (e) { document.getElementById('instruction').innerText = "KAMERA FEHLER"; }
        }

        function toggleMenu() {
            document.getElementById('main-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('current-mode-title').innerText = mode;
            document.getElementById('group-2').style.display = (mode === 'Item Transfer') ? "block" : "none";
            document.getElementById('label-1').innerText = (mode === 'Platz prüfen') ? "LAGERPLATZ" : "ARTIKEL / EAN";
            toggleMenu(); resetInputs();
        }

        function resetInputs() {
            document.getElementById('input-1').value = ""; document.getElementById('input-2').value = "";
            document.getElementById('action-buttons').style.display = "none";
        }

        function setupZoom() {
            document.getElementById('zoom-range').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('zoom-label').innerText = `🔍 ZOOM: ${val.toFixed(1)}x`;
                if (cameraTrack) cameraTrack.applyConstraints({ advanced: [{ zoom: val }] }).catch(() => {});
                const v = document.querySelector('#reader video');
                if (v) v.style.transform = `scale(${val})`;
            });
        }

        function processScan(text) {
            const i1 = document.getElementById('input-1'), i2 = document.getElementById('input-2');
            if (currentMode !== 'Item Transfer') {
                i1.value = text;
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('btn-main').innerText = "INFO ABRUFEN";
                document.getElementById('btn-sub').style.display = "none";
            } else {
                if (!i1.value) { i1.value = text; document.getElementById('instruction').innerText = "JETZT PLATZ SCANNEN"; }
                else if (!i2.value && text !== i1.value) { 
                    i2.value = text; 
                    document.getElementById('action-buttons').style.display = "flex"; 
                    document.getElementById('btn-sub').style.display = "block";
                    document.getElementById('btn-main').innerText = "EINLAGERN";
                }
            }
        }

        function handleAction(type) {
            const ware = document.getElementById('input-1').value;
            const platz = document.getElementById('input-2').value;
            let finalUrl = APP_CONFIG.url + "?";

            if (currentMode === 'Item Transfer') {
                finalUrl += `ware=${ware}&platz=${platz}&typ=${type === 'EIN' ? 'EINLAGERN' : 'AUSLAGERN'}`;
            } else if (currentMode === 'Platz prüfen') {
                finalUrl += `action=getPlatzInfo&platz=${ware}`;
            } else {
                finalUrl += `action=getInfo&ware=${ware}`;
            }

            document.getElementById('instruction').innerText = "SENDE...";
            fetch(finalUrl, { method: "GET", mode: "no-cors" })
                .then(() => { 
                    alert("Anfrage gesendet!"); 
                    resetInputs(); 
                    document.getElementById('instruction').innerText = "SCANNER BEREIT";
                });
        }

        window.onload = init;
    </script>
</body>
</html>
