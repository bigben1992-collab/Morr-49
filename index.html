<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lager Pro | Fix Edition</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
    .container { max-width: 500px; margin: auto; }
    .nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button.active { background: var(--primary); color: white; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
    .card.active { display: block; }
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
    .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-in { background: var(--success); color: white; }
    .btn-out { background: var(--danger); color: white; }
    .result-box { background: #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; min-height: 40px; border-left: 5px solid var(--primary); }
    #reader-waren, #reader-platz { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <input type="hidden" id="backend-url" value="DEINE_AKTUELLE_URL">

  <div class="nav">
    <button id="btn-waren" class="active" onclick="switchTab('warenbewegung')">BUCHEN</button>
    <button id="btn-platz" onclick="switchTab('platzpruefung')">BESTAND</button>
    <button id="btn-settings" onclick="switchTab('einstellungen')">SETUP</button>
  </div>

  <div id="warenbewegung" class="card active">
    <h3>📦 Buchung</h3>
    <div id="reader-waren"></div>
    <input type="text" id="w-artikel" placeholder="Artikel-Barcode">
    <input type="number" id="w-menge" placeholder="Menge" value="1">
    <input type="text" id="w-platz" placeholder="Lagerplatz">
    <div class="grid-btns">
      <button class="btn-in" onclick="buchung('Einlagerung')">📥 EIN</button>
      <button class="btn-out" onclick="buchung('Entnahme')">📤 AUS</button>
    </div>
  </div>

  <div id="platzpruefung" class="card">
    <h3>🔍 Abfrage</h3>
    <div id="reader-platz"></div>
    <input type="text" id="p-platz" placeholder="Platz scannen..." onchange="abfrage()">
    <div id="p-ergebnis" class="result-box">Scanne einen Platz...</div>
  </div>

  <div id="einstellungen" class="card">
    <h3>⚙️ Setup</h3>
    <p>Modus: GitHub JSONP-Bridge</p>
    <button onclick="location.reload()" style="width:100%; background:#64748b; color:white;">🔄 Reload</button>
  </div>
</div>

<script>
  let html5QrCode;
  const baseUrl = document.getElementById('backend-url').value;

  // 1. BUCHUNG (POST - "Blind" senden wegen CORS)
  async function buchung(typ) {
    const data = {
      aktion: "buchung",
      daten: {
        typ: typ,
        artikel: document.getElementById('w-artikel').value,
        menge: document.getElementById('w-menge').value,
        platz: document.getElementById('w-platz').value
      }
    };
    
    if(!data.daten.artikel || !data.daten.platz) return alert("Bitte Felder füllen!");

    fetch(baseUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
    alert("Buchung (" + typ + ") gesendet!");
    document.getElementById('w-artikel').value = "";
  }

  // 2. ABFRAGE (JSONP-Trick um CORS zu umgehen)
  function abfrage() {
    const platzId = document.getElementById('p-platz').value;
    const resBox = document.getElementById('p-ergebnis');
    resBox.innerHTML = "⏳ Suche...";

    // Dynamisches Script-Tag erstellen
    const script = document.createElement('script');
    script.src = `${baseUrl}?aktion=pruefung&platzId=${encodeURIComponent(platzId)}&callback=handleResponse`;
    document.body.appendChild(script);
    // Script danach wieder aufräumen
    document.body.removeChild(script);
  }

  // Callback-Funktion für die Bestandsdaten
  window.handleResponse = function(data) {
    const resBox = document.getElementById('p-ergebnis');
    if(data.status === "success" && data.res) {
      resBox.innerHTML = `📦 Artikel: ${data.res.artikel}<br>🔢 Bestand: ${data.res.menge}`;
      resBox.style.color = "black";
    } else {
      resBox.innerHTML = "❌ Platz leer oder unbekannt.";
      resBox.style.color = "red";
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.getElementById('btn-' + tabId.substring(0,5)).classList.add('active');
    if (html5QrCode) html5QrCode.stop().then(() => startScanner(tabId)).catch(() => startScanner(tabId));
  }

  function startScanner(tabId) {
    const el = tabId === 'warenbewegung' ? "reader-waren" : (tabId === 'platzpruefung' ? "reader-platz" : null);
    if(!el) return;
    html5QrCode = new Html5Qrcode(el);
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: {width:250, height:150} }, (txt) => {
      if(tabId === 'warenbewegung') {
        if(!document.getElementById('w-platz').value) document.getElementById('w-platz').value = txt;
        else document.getElementById('w-artikel').value = txt;
      } else {
        document.getElementById('p-platz').value = txt;
        abfrage();
      }
      navigator.vibrate(50);
    }).catch(() => {});
  }

  window.onload = () => startScanner('warenbewegung');
</script>
</body>
</html>
