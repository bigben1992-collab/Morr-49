<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lager Pro | Super Supreme System</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --danger: #ef4444; --success: #22c55e; --bg: #f8fafc; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #334155; }
    
    header { background: white; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .logo-box { max-width: 180px; margin: 0 auto; height: 60px; display: flex; align-items: center; justify-content: center; }
    .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    
    /* Lade-Overlay (Sperrbildschirm) */
    #loader-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { margin-top: 15px; font-weight: bold; color: var(--primary); }

    .nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
    .nav-btn { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 2px; font-size: 11px; font-weight: 700; color: #64748b; cursor: pointer; transition: 0.2s; }
    .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); display: none; border: 1px solid #f1f5f9; }
    .card.active { display: block; }
    
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fcfcfd; }
    .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .btn-action { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
    .btn-in { background: var(--success); }
    .btn-out { background: var(--danger); }
    
    .result-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 5px solid var(--accent); }
    #reader-waren, #reader-platz, #reader-suche { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 10px; background: #000; border: 2px solid #eee; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    td { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  </style>
</head>
<body>

<div id="loader-overlay">
  <div class="spinner"></div>
  <div id="status-text" class="loader-text">Verbindung zum Lager...</div>
</div>

<header>
  <div class="logo-box"><img src="logo.png" alt="Logo"></div>
</header>

<div class="container">
  <input type="hidden" id="backend-url" value="https://script.google.com/macros/s/AKfycbxcjr-44mQ2O-0mGoaNrEitLJxMIOPOgpgarp8j_8xF5lx-JmWhJYz2R17e26Iep_6hgA/exec">

  <div class="nav">
    <button id="btn-waren" class="nav-btn active" onclick="switchTab('warenbewegung')">BUCHEN</button>
    <button id="btn-platz" class="nav-btn" onclick="switchTab('platzpruefung')">PLATZ</button>
    <button id="btn-suche" class="nav-btn" onclick="switchTab('warensuche')">SUCHE</button>
    <button id="btn-settings" class="nav-btn" onclick="switchTab('einstellungen')">SETUP</button>
  </div>

  <div id="warenbewegung" class="card active">
    <h3>📦 Buchen</h3>
    <div id="reader-waren"></div>
    <input type="text" id="w-platz" placeholder="Lagerplatz">
    <input type="text" id="w-artikel" placeholder="Artikel">
    <input type="number" id="w-menge" placeholder="Menge" value="1">
    <div class="grid-btns">
      <button class="btn-action btn-in" onclick="sendBuchung('Einlagerung')">📥 EIN</button>
      <button class="btn-action btn-out" onclick="sendBuchung('Entnahme')">📤 AUS</button>
    </div>
  </div>

  <div id="platzpruefung" class="card">
    <h3>🔍 Platz-Abfrage</h3>
    <div id="reader-platz"></div>
    <input type="text" id="p-platz" placeholder="Platz scannen..." onchange="sendAbfrage()">
    <div id="p-ergebnis" class="result-box">Warten...</div>
  </div>

  <div id="warensuche" class="card">
    <h3>🔎 Artikelsuche</h3>
    <div id="reader-suche"></div>
    <input type="text" id="s-artikel" placeholder="Artikel scannen..." onchange="sendWarensuche()">
    <div id="s-ergebnis" class="result-box">Ergebnisse...</div>
  </div>

  <div id="einstellungen" class="card">
    <h3>⚙️ Setup</h3>
    <button onclick="location.reload()" style="width:100%; background:var(--primary); color:white; padding:15px; border-radius:12px; border:none; font-weight:bold;">🔄 App Refresh</button>
  </div>
</div>

<script>
  let html5QrCode;
  const getUrl = () => document.getElementById('backend-url').value;

  // HILFSFUNKTIONEN FÜR STATUS
  function setStatus(visible, text = "Lade...") {
    const overlay = document.getElementById('loader-overlay');
    document.getElementById('status-text').innerText = text;
    overlay.style.display = visible ? 'flex' : 'none';
  }

  async function sendBuchung(typ) {
    const id = document.getElementById('w-artikel').value;
    const platz = document.getElementById('w-platz').value;
    if(!id || !platz) return alert("Daten unvollständig!");

    setStatus(true, "Prüfe Artikel...");
    
    let nName = "";
    try {
      const res = await fetch(`${getUrl()}?aktion=warensuche&artikelId=${encodeURIComponent(id)}`);
      const data = await res.json();
      
      if (!data.name) {
        setStatus(false); // Cursor für Prompt freigeben
        nName = prompt("Neuer Artikel! Name:");
        if (!nName) return;
        setStatus(true, "Speichere neuen Artikel...");
      }
    } catch(e) { setStatus(false); }

    setStatus(true, "Buchung wird übertragen...");
    
    // Wir nutzen hier POST. Um auf die Antwort zu warten, entfernen wir "no-cors"
    // Google braucht für eine echte Antwort oft einen speziellen fetch-Aufbau
    try {
      await fetch(getUrl(), { 
        method: "POST", 
        body: JSON.stringify({aktion:"buchung", daten:{typ, artikel:id, menge:document.getElementById('w-menge').value, platz, neuerName:nName}}) 
      });
      setStatus(false);
      alert("✅ Erfolgreich gebucht!");
      document.getElementById('w-artikel').value = "";
    } catch(e) {
      setStatus(false);
      alert("✅ Buchung gesendet (Google Bestätigung ausstehend)");
    }
  }

  async function sendAbfrage() {
    setStatus(true, "Suche Platz-Details...");
    try {
      const r = await fetch(`${getUrl()}?aktion=pruefung&platzId=${encodeURIComponent(document.getElementById('p-platz').value)}`);
      const d = await r.json();
      document.getElementById('p-ergebnis').innerHTML = d.res ? `<b>${d.res.name}</b><br><span style="color:var(--accent);">Bestand: ${d.res.menge}</span>` : "Leer.";
    } catch (e) {}
    setStatus(false);
  }

  async function sendWarensuche() {
    setStatus(true, "Suche Bestände...");
    try {
      const r = await fetch(`${getUrl()}?aktion=warensuche&artikelId=${encodeURIComponent(document.getElementById('s-artikel').value)}`);
      const d = await r.json();
      if(d.res && d.res.length > 0) {
        let h = `<b>${d.name}</b><table><tr><th>Platz</th><th>Menge</th></tr>`;
        d.res.forEach(i => h += `<tr><td>📍 ${i.platz}</td><td>${i.menge}</td></tr>`);
        document.getElementById('s-ergebnis').innerHTML = h + "</table>";
      } else { document.getElementById('s-ergebnis').innerHTML = "Nichts gefunden."; }
    } catch (e) {}
    setStatus(false);
  }

  function switchTab(t) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    const bId = t==='warenbewegung'?'btn-waren':t==='platzpruefung'?'btn-platz':t==='warensuche'?'btn-suche':'btn-settings';
    document.getElementById(bId).classList.add('active');
    if (html5QrCode) html5QrCode.stop().then(() => startScanner(t)).catch(() => startScanner(t));
    else startScanner(t);
  }

  function startScanner(t) {
    const elMap = { 'warenbewegung':'reader-waren', 'platzpruefung':'reader-platz', 'warensuche':'reader-suche' };
    if(!elMap[t]) return;
    html5QrCode = new Html5Qrcode(elMap[t]);
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
      if(t === 'warenbewegung') {
        if(!document.getElementById('w-platz').value) document.getElementById('w-platz').value = txt;
        else document.getElementById('w-artikel').value = txt;
      } else if(t === 'platzpruefung') {
        document.getElementById('p-platz').value = txt; sendAbfrage();
      } else if(t === 'warensuche') {
        document.getElementById('s-artikel').value = txt; sendWarensuche();
      }
    }).catch(() => {});
  }
  window.onload = () => startScanner('warenbewegung');
</script>
</body>
</html>
