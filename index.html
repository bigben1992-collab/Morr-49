<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager-Pro | Filiale 77</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --accent: #d63384; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Kamera-Bereich */
        #reader { width: 100%; min-height: 300px; height: 40vh; background: #000; }
        
        /* Container für die Bedienelemente */
        .ui-wrapper { 
            flex: 1; 
            width: 100%; 
            background: white; 
            border-radius: 20px 20px 0 0; 
            margin-top: -20px; 
            z-index: 999; /* Sicherstellen, dass es oben liegt */
            padding: 15px; 
            box-sizing: border-box; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        /* ZOOM-STEUERUNG ERZWINGEN */
        .zoom-box { 
            display: block !important; 
            background: #f1f3f5; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 2px solid var(--primary);
        }
        
        .zoom-slider { 
            width: 100%; 
            height: 40px; 
            margin-top: 10px;
            cursor: pointer;
        }

        #instruction { font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .btn-row { display: none; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="ui-wrapper">
        <div id="instruction">KAMERA WIRD GESTARTET...</div>
        
        <div class="zoom-box" id="zoom-area">
            <label>🔍 ZOOM (Schieberegler nutzen):</label>
            <input type="range" class="zoom-slider" id="zoom-range" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label>ARTIKEL</label>
            <input type="text" id="input-ware" placeholder="Bitte scannen..." readonly>
            <span id="val-artikel-name" style="font-weight:bold; color:var(--primary)"></span>
        </div>

        <div class="input-group">
            <label>LAGERPLATZ</label>
            <input type="text" id="input-platz" placeholder="Bitte scannen..." readonly>
        </div>

        <div class="btn-row" id="action-buttons">
            <button style="background: var(--success);" onclick="submit('EINLAGERN')">EINLAGERN</button>
            <button style="background: var(--danger);" onclick="submit('AUSLAGERN')">AUSLAGERN</button>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbxXe3A2Ym0gm_r4R_HdEU_B8afvzc645--F031Y60znDFIEVb_RtUVeHA8vpXF84XzSCw/exec", 
            branch: "Filiale 77 Hansen"
        };

        let scanner;
        let cameraTrack = null;

        async function init() {
            // Erst den Slider aktivieren
            setupZoomListener();
            
            // Dann Scanner starten
            scanner = new Html5Qrcode("reader");
            try {
                await scanner.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: { width: 250, height: 150 } },
                    (text) => { processScan(text); }
                );
                document.getElementById('instruction').innerText = "BEREIT: ARTIKEL SCANNEN";
                
                // Track für Zoom holen
                setTimeout(() => {
                    cameraTrack = scanner.getRunningTrack();
                    updateZoomLimits();
                }, 1500);

            } catch (e) {
                document.getElementById('instruction').innerText = "FEHLER: Kamera-Zugriff prüfen!";
            }
        }

        function setupZoomListener() {
            const slider = document.getElementById('zoom-range');
            slider.addEventListener('input', (e) => {
                if (cameraTrack) {
                    cameraTrack.applyConstraints({
                        advanced: [{ zoom: parseFloat(e.target.value) }]
                    }).catch(err => console.error("Hardware Zoom Error", err));
                }
            });
        }

        function updateZoomLimits() {
            if (cameraTrack && cameraTrack.getCapabilities) {
                const caps = cameraTrack.getCapabilities();
                if (caps.zoom) {
                    const slider = document.getElementById('zoom-range');
                    slider.min = caps.zoom.min;
                    slider.max = caps.zoom.max;
                    slider.step = caps.zoom.step;
                }
            }
        }

        function processScan(text) {
            const inputWare = document.getElementById('input-ware');
            const inputPlatz = document.getElementById('input-platz');

            if (!inputWare.value) {
                inputWare.value = text;
                // Hier käme dein handleWare() Fetch...
                document.getElementById('instruction').innerText = "NÄCHSTER SCHRITT: PLATZ SCANNEN";
            } else if (!inputPlatz.value && text !== inputWare.value) {
                inputPlatz.value = text;
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('instruction').innerText = "BUCHUNG BEREIT";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
