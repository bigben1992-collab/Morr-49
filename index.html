<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager-Pro | Filiale 77</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --accent: #d63384; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #reader { width: 100%; height: 45vh; background: #000; position: relative; }
        #reader video { object-fit: cover !important; height: 45vh !important; }

        /* Container für die UI */
        .container { flex: 1; width: 100%; overflow-y: auto; padding: 15px; box-sizing: border-box; background: white; border-radius: 20px 20px 0 0; margin-top: -20px; z-index: 10; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        
        #instruction { font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; font-size: 14px; }
        
        /* Zoom-Bereich jetzt IMMER sichtbar */
        .camera-controls { 
            background: #f8f9fa; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            border: 2px solid #eee; 
        }
        .zoom-slider { width: 100%; height: 40px; cursor: pointer; accent-color: var(--primary); }
        
        .input-group { margin-bottom: 10px; }
        label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        #val-artikel-name { color: var(--primary); font-size: 13px; font-weight: bold; display: block; margin-top: 2px; }
        #platz-liste { margin-top: 10px; background: #eef2f7; border-left: 4px solid var(--primary); padding: 8px; display: none; font-size: 13px; }
        .status-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; background: #f0f2f5; padding: 8px; border-radius: 6px; }

        .btn-container { display: none; gap: 10px; margin-top: 15px; padding-bottom: 30px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; }
        
        .scan-lock { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="container" id="ui-main">
        <div id="instruction">SCHRITT 1: Artikel scannen</div>
        
        <div class="camera-controls">
            <label>🔍 Manueller Zoom / Fokus-Hilfe</label>
            <input type="range" class="zoom-slider" id="zoom-range" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="input-group">
            <label>Artikelnummer</label>
            <input type="text" id="input-ware" placeholder="Scan..." onchange="handleWare()">
            <span id="val-artikel-name"></span>
        </div>

        <div class="input-group">
            <label>Lagerplatz</label>
            <input type="text" id="input-platz" placeholder="Scan..." onchange="handlePlatz()">
        </div>

        <div id="platz-liste">
            <div id="liste-content"></div>
        </div>

        <div class="status-row">
            <span>Platz: <b id="val-info-platz">---</b></span>
            <span>Bestand: <b id="val-bestand">---</b></span>
        </div>

        <div class="btn-container" id="action-buttons">
            <button style="background: var(--success);" onclick="submit('EINLAGERN')">EINLAGERN</button>
            <button style="background: var(--danger);" onclick="submit('AUSLAGERN')">AUSLAGERN</button>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbxXe3A2Ym0gm_r4R_HdEU_B8afvzc645--F031Y60znDFIEVb_RtUVeHA8vpXF84XzSCw/exec", // <--- HIER DEINE URL EINTRAGEN
            branch: "Filiale 77 Hansen"
        };

        let scanner;
        let isLocked = false;

        async function startScanner() {
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: (viewWidth, viewHeight) => {
                    return { width: viewWidth * 0.8, height: viewHeight * 0.6 };
                },
                aspectRatio: 1.0
            };
            
            try {
                await scanner.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => { if (!isLocked) processScan(text); }
                );
                
                // Nach Start versuchen, die Schieberegler-Grenzen an die Kamera anzupassen
                setTimeout(syncZoomCapabilities, 1500);

            } catch (err) {
                console.error("Kamera-Fehler:", err);
                document.getElementById('instruction').innerText = "Kamera blockiert!";
            }
        }

        function syncZoomCapabilities() {
            try {
                const track = scanner.getRunningTrack();
                const capabilities = track.getCapabilities();
                const zoomControl = document.getElementById('zoom-range');

                if (capabilities.zoom) {
                    zoomControl.min = capabilities.zoom.min;
                    zoomControl.max = capabilities.zoom.max;
                    zoomControl.step = capabilities.zoom.step;
                }

                // Event-Listener für den Slider
                zoomControl.oninput = async (e) => {
                    try {
                        await track.applyConstraints({ advanced: [{ zoom: e.target.value }] });
                    } catch (zoomErr) {
                        console.warn("Zoom-Anwendung fehlgeschlagen", zoomErr);
                    }
                };
            } catch (e) {
                console.log("Zoom von Hardware/Browser nicht unterstützt.");
            }
        }

        function processScan(text) {
            if (navigator.vibrate) navigator.vibrate(50);
            const inputWare = document.getElementById('input-ware');
            const inputPlatz = document.getElementById('input-platz');

            if (!inputWare.value) {
                inputWare.value = text;
                handleWare();
            } else if (!inputPlatz.value && text !== inputWare.value) {
                inputPlatz.value = text;
                handlePlatz();
            }
        }

        async function handleWare() {
            const val = document.getElementById('input-ware').value;
            if (!val) return;
            lockUI(true);
            try {
                const res = await fetch(`${APP_CONFIG.url}?action=getInfo&ware=${encodeURIComponent(val)}`);
                const data = await res.json();
                document.getElementById('val-info-platz').innerText = data.platz;
                document.getElementById('val-bestand').innerText = data.bestand;
                document.getElementById('val-artikel-name').innerText = data.name;
                document.getElementById('instruction').innerText = "SCHRITT 2: Platz scannen";
            } catch (e) { 
                document.getElementById('val-artikel-name').innerText = "Unbekannt";
            }
            lockUI(false);
        }

        async function handlePlatz() {
            const val = document.getElementById('input-platz').value;
            if (!val) return;
            lockUI(true);
            try {
                const res = await fetch(`${APP_CONFIG.url}?action=getPlatzInfo&platz=${encodeURIComponent(val)}`);
                const data = await res.json();
                const content = document.getElementById('liste-content');
                content.innerHTML = data.artikel.length ? 
                    data.artikel.map(a => `<div>${a.name}: <b>${a.menge} Stk.</b></div>`).join('') : "Platz leer";
                document.getElementById('platz-liste').style.display = "block";
                document.getElementById('action-buttons').style.display = "flex";
                document.getElementById('instruction').innerText = "Bereit zum Buchen";
            } catch (e) { console.error(e); }
            lockUI(false);
        }

        function submit(type) {
            lockUI(true);
            const ware = document.getElementById('input-ware').value;
            const platz = document.getElementById('input-platz').value;
            const url = `${APP_CONFIG.url}?ware=${encodeURIComponent(ware)}&platz=${encodeURIComponent(platz)}&typ=${type}`;
            
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    alert(`${type} gebucht!`);
                    location.reload(); 
                })
                .catch(() => { alert("Fehler!"); lockUI(false); });
        }

        function lockUI(state) {
            isLocked = state;
            document.getElementById('ui-main').classList.toggle('scan-lock', state);
        }

        window.onload = startScanner;
    </script>
</body>
</html>
