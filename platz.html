<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platz Info</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; aspect-ratio: 1; background: #000; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    .res { background: #f8fafc; padding: 15px; border-radius: 12px; border-left: 4px solid var(--a); margin-top: 10px; min-height: 50px; }
    .back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--a); font-weight: bold; }
  </style>
</head>
<body>
  <header><img src="logo.png" style="height:35px;"></header>
  <div class="container">
    <div class="card">
      <h3>📍 Platz-Info</h3>
      <div id="reader"></div>
      <input type="text" id="pi" placeholder="Platz scannen..." onchange="check()">
      <div id="out" class="res">Warte auf Scan...</div>
    </div>
    <a href="index.html" class="back">← Hauptmenü</a>
  </div>
  <script>
    const api = "DEINE_WEB_APP_URL";
    let sc = new Html5Qrcode("reader");

    async function check() {
      const p = document.getElementById('pi').value;
      if(!p) return;
      document.getElementById('out').innerText = "Suche...";
      
      try {
        const r = await fetch(`${api}?aktion=pruefung&platzId=${encodeURIComponent(p)}`);
        const d = await r.json();
        document.getElementById('out').innerHTML = d.res 
          ? `<b>${d.res.name}</b><br>ID: ${d.res.artikel}<br>Bestand: ${d.res.menge}` 
          : "Dieser Platz ist aktuell leer.";
      } catch(e) { 
        document.getElementById('out').innerText = "Fehler bei der Abfrage."; 
      }
    }

    sc.start({facingMode:"environment"}, {fps:15, qrbox:250}, (txt) => {
      document.getElementById('pi').value = txt; 
      check();
      if(window.navigator.vibrate) window.navigator.vibrate(50);
    }).catch(() => {});
  </script>
</body>
</html>
